<!DOCTYPE html>
<html>
<head>
  <title>Skill Measure - Coding Round</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <h2 id="challenge-title">Loading Coding Challenge...</h2>
  <p id="challenge-description"></p>

  <div class="code-editor">
    <h3>Write Your Code:</h3>
    <textarea id="code-input" placeholder="Write your solution here..."></textarea>
  </div>

  <div class="test-cases">
    <h3>Test Cases:</h3>
    <div id="test-cases-container"></div>
  </div>

  <div class="buttons">
    <button onclick="runCode()">Run Code</button>
    <button onclick="nextChallenge()">Next Challenge</button>
    <button onclick="showSolution()">Show Solution</button>
  </div>

  <div id="output"></div>
</div>

<script>
let challenges = [];
let currentChallengeIndex = 0;
let skills = [];
let codingScore = 0;            // number of challenges solved correctly
let codingResults = [];        // array to remember per-challenge correctness
let quizScore = 0;
let quizTotal = 0;
let registerNumber = "";        // Store register number for database

// Determine the backend URL dynamically
const getBackendURL = () => {
  if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
    return "http://localhost:3000";
  }
  return `${window.location.protocol}//${window.location.host}`;
};

const backendURL = getBackendURL();

window.onload = () => {
  const uploadId = localStorage.getItem("uploadId");
  if (!uploadId) {
    alert("⚠️ No resume data found. Please upload a resume first.");
    window.location.href = "upload.html";
    return;
  }

  // Get all data from localStorage
  const storedChallenges = localStorage.getItem(`coding_${uploadId}`);
  const storedSkills = localStorage.getItem(`skills_${uploadId}`);
  quizScore = parseInt(localStorage.getItem(`quiz_score_${uploadId}`) || "0", 10);
  quizTotal = parseInt(localStorage.getItem(`quiz_total_${uploadId}`) || "0", 10);
  registerNumber = localStorage.getItem("registerNumber") || "Unknown";

  challenges = JSON.parse(storedChallenges || "[]");
  skills = JSON.parse(storedSkills || "[]");

  if (challenges.length === 0) {
    document.getElementById("challenge-title").innerText = "⚠️ No Coding Challenges Available";
    document.getElementById("challenge-description").innerText = "No coding challenges were generated for your detected skills. This might happen if your skills are not in our challenge database.";
    document.querySelector(".code-editor").style.display = "none";
    document.querySelector(".test-cases").style.display = "none";
    document.querySelector(".buttons").style.display = "none";
    return;
  }

  showChallenge();
};

function showChallenge() {
  if (currentChallengeIndex >= challenges.length) {
    // finished; show summary report instead of challenge UI
    showSummary();
    return;
  }

  const challenge = challenges[currentChallengeIndex];
  document.getElementById("challenge-title").innerText = challenge.title;
  document.getElementById("challenge-description").innerText = challenge.description;

  // Set starter code
  document.getElementById("code-input").value = challenge.starter_code;

  // Show test cases
  const testCasesContainer = document.getElementById("test-cases-container");
  testCasesContainer.innerHTML = "";
  challenge.test_cases.forEach((testCase, index) => {
    const testDiv = document.createElement("div");
    testDiv.className = "test-case";
    testDiv.innerHTML = `
      <strong>Test ${index + 1}:</strong><br>
      Input: ${testCase.input}<br>
      Expected: ${testCase.expected}
    `;
    testCasesContainer.appendChild(testDiv);
  });

  document.getElementById("output").innerHTML = "";
}

function runCode() {
  const code = document.getElementById("code-input").value;
  const outputDiv = document.getElementById("output");

  if (!code.trim()) {
    outputDiv.innerHTML = "<p style='color: #ff6b6b;'>⚠️ Please write some code first!</p>";
    return;
  }

  // Basic validation for the current challenge
  const challenge = challenges[currentChallengeIndex];
  let isCorrect = false;
  let feedback = "";

  if (challenge.title === "Basic Programming Challenge") {
    // Check for the default challenge
    if (code.includes("return 'Hello, World!'") || code.includes('return "Hello, World!"')) {
      isCorrect = true;
      feedback = "<p style='color: #4ecdc4;'>✅ Correct! Your code looks good.</p>";
    } else {
      feedback = "<p style='color: #ff6b6b;'>❌ Not quite right. Try returning 'Hello, World!'</p>";
    }
  } else {
    // For other challenges, provide basic feedback
    const solution = challenge.solution.toLowerCase();
    const userCode = code.toLowerCase();
    
    // Check if key elements are present
    const hasFunction = userCode.includes(challenge.starter_code.split('(')[0].toLowerCase());
    const hasReturn = userCode.includes('return');
    
    if (hasFunction && hasReturn) {
      feedback = "<p style='color: #ffe66d;'>🤔 Your code structure looks good! Check the solution for details.</p>";
    } else {
      feedback = "<p style='color: #ff6b6b;'>❌ Check your function definition and return statement.</p>";
    }
  }

  outputDiv.innerHTML = feedback + "<p>Your code:</p><pre>" + code + "</pre>";

  // record result for this challenge
  codingResults[currentChallengeIndex] = isCorrect;
  if (isCorrect) {
    // increment only the first time we mark correct
    if (codingScore < codingResults.filter(Boolean).length) {
      // already counted
    } else {
      codingScore++;
    }
  }
}  

function nextChallenge() {
  currentChallengeIndex++;
  showChallenge();
}

function showSolution() {
  const challenge = challenges[currentChallengeIndex];
  const outputDiv = document.getElementById("output");

  outputDiv.innerHTML = "<p style='color: #ffe66d;'>💡 Solution:</p><pre>" + challenge.solution + "</pre>";
}

// ------------------------------------------------------------------
// Summary display after coding round finishes
// ------------------------------------------------------------------
function showSummary() {
  const uploadId = localStorage.getItem("uploadId");
  const resumeName = uploadId ? localStorage.getItem(`resumeName_${uploadId}`) : "";

  // Save scores to database
  saveScoresToDatabase(quizScore, codingScore, quizTotal, challenges.length);

  // build summary HTML
  const totalCoding = challenges.length;
  const skillCount = skills.length;
  let advice = "";

  if (codingScore === totalCoding && quizScore === quizTotal) {
    advice = "🎉 Excellent work! Your quiz and coding round scores are perfect. Keep sharpening your skills and maintaining a strong resume with quantified achievements.";
  } else {
    advice = "📝 To improve your performance, review the topics related to your detected skills (" + (skills.join(", ") || "none") + ") and practice more coding challenges. Make sure your resume clearly lists these skills and includes measurable results from your projects or work experience.";
  }

  const summaryHTML = `
    <h2>📊 Summary Report</h2>
    ${resumeName ? `<p><em>Resume:</em> ${resumeName}</p>` : ""}
    <p><strong>Quiz Score:</strong> ${quizScore} / ${quizTotal}</p>
    <p><strong>Coding Score:</strong> ${codingScore} / ${totalCoding}</p>
    <p><strong>Skills Detected:</strong> ${skillCount} (${skills.join(", ")})</p>
    <div class="advice">
      <h3>Recommendations</h3>
      <p>${advice}</p>
    </div>
    <button onclick="restart()" style="margin-top:20px; padding:10px 20px; background:#00f2fe; color:#000; border:none; border-radius:5px; cursor:pointer;">🔄 Start Over</button>
  `;

  const container = document.querySelector(".container");
  container.innerHTML = summaryHTML;
}

// Function to save scores to database
async function saveScoresToDatabase(qScore, cScore, qTotal, cTotal) {
  try {
    const response = await fetch(`${backendURL}/api/update-scores`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        registerNumber: registerNumber,
        quizScore: qScore,
        codingScore: cScore,
        totalQuizQuestions: qTotal,
        totalCodingQuestions: cTotal
      })
    });

    if (response.ok) {
      console.log("✅ Scores saved to database successfully");
    } else {
      console.error("❌ Failed to save scores:", response.status);
    }
  } catch (error) {
    console.error("❌ Error saving scores:", error);
  }
}

function restart() {
  const uploadId = localStorage.getItem("uploadId");
  if (uploadId) {
    localStorage.removeItem(`quiz_${uploadId}`);
    localStorage.removeItem(`coding_${uploadId}`);
    localStorage.removeItem(`skills_${uploadId}`);
    localStorage.removeItem(`quiz_score_${uploadId}`);
    localStorage.removeItem(`quiz_total_${uploadId}`);
    localStorage.removeItem(`resumeName_${uploadId}`);
    localStorage.removeItem("uploadId");
  }
  window.location.href = "upload.html";
}

/* Particles */
const particleBox = document.getElementById("particles");
for (let i = 0; i < 40; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 12) + "s";
  p.style.opacity = Math.random();
  particleBox.appendChild(p);
}
</script>

</body>
</html>
